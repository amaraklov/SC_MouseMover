<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mouse Drift UI Mockup</title>
  <style>
    :root {
      --bg: #08111c;
      --panel: #1b1914;
      --panel-2: #251f15;
      --glow: #ffb347;
      --glow-soft: rgba(255, 179, 71, 0.28);
      --text: #ffd28c;
      --muted: #a7834f;
      --danger: #ff7e68;
      --danger-soft: rgba(255, 126, 104, 0.18);
      --line: rgba(255, 191, 95, 0.78);
      --input-bg: rgba(255, 191, 95, 0.05);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,179,71,0.12), transparent 30%),
        linear-gradient(180deg, #05080d 0%, #091321 100%);
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
    }

    .wrap {
      width: min(930px, 96vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      background: linear-gradient(180deg, rgba(39,31,20,0.95), rgba(20,18,14,0.98));
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(255,188,92,0.18),
        0 0 40px rgba(0,0,0,0.45),
        inset 0 0 50px rgba(255,179,71,0.06);
      overflow: hidden;
      position: relative;
    }

    .panel {
      width: 100%;
      padding: 18px 18px 14px;
    }

    .hud-stage {
      position: relative;
    }

    .svg-shell {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 10px rgba(255,179,71,0.18));
    }


    .notice-box {
      position: absolute;
      top: 12.5%;
      left: 76%;
      width: 15%;
      height: 53%;
      border-radius: 22px;
      border: 1px solid rgba(255,191,95,0.34);
      background: linear-gradient(180deg, rgba(23,20,15,0.9), rgba(18,16,12,0.95));
      box-shadow: inset 0 0 24px rgba(255,179,71,0.08);
      padding: 12px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .notice-title {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #ffd27d;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,191,95,0.22);
    }

    .notice-list {
      display: grid;
      align-content: start;
      gap: 6px;
      overflow: hidden;
      min-height: 0;
    }

    .notice-item {
      border-radius: 9px;
      border: 1px solid rgba(255,191,95,0.22);
      background: rgba(255,191,95,0.04);
      padding: 6px 7px;
      line-height: 1.25;
      font-size: 11px;
      color: #ffdca2;
    }

    .notice-item.warn {
      border-color: rgba(255,126,104,0.42);
      color: #ffb29e;
      background: rgba(255,126,104,0.09);
    }

    .svg-btn {
      cursor: pointer;
      transition: filter 140ms ease, opacity 140ms ease;
    }

    .svg-btn:hover {
      filter: brightness(1.06) drop-shadow(0 0 8px rgba(255,179,71,0.2));
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">

  <script>
    const state = {
      mouseOn: false,
      keyOn: false,
      intervalSec: 4.8,
      maxPixels: 96,
      movesBeforeReturn: 16,
      smoothSteps: 12,
      moveDuration: 0.18,
      keyInterval: 2.5,
    };

    const MOUSE_MIN_SEC = 0.6;
    const MOUSE_MAX_SEC = 9.0;
    const KEY_MIN_SEC = 0.5;
    const KEY_MAX_SEC = 4.5;
    const DIST_MIN = 0;
    const DIST_MAX = 255;
    const MOVES_MIN = 4;
    const MOVES_MAX = 32;
    const DURATION_MIN = 0.05;
    const DURATION_MAX = 0.5;
    const SMOOTH_MIN = 4;
    const SMOOTH_MAX = 20;

    const els = {
      svgMouseInterval: document.getElementById('svgMouseInterval'),
      svgKeyInterval: document.getElementById('svgKeyInterval'),
      telemetryMouseSec: document.getElementById('telemetryMouseSec'),
      telemetryKeySec: document.getElementById('telemetryKeySec'),
      telemetryMaxPx: document.getElementById('telemetryMaxPx'),
      telemetryMoves: document.getElementById('telemetryMoves'),
      telemetrySmooth: document.getElementById('telemetrySmooth'),
      telemetryMoveDur: document.getElementById('telemetryMoveDur'),
      mouseStatusStrip: document.getElementById('mouseStatusStrip'),
      keyStatusStrip: document.getElementById('keyStatusStrip'),
      noticeList: document.getElementById('noticeList'),
      leftBarFill: document.getElementById('leftBarFill'),
      rightBarFill: document.getElementById('rightBarFill'),
      leftBarHot: document.getElementById('leftBarHot'),
      rightBarHot: document.getElementById('rightBarHot'),
      movesBarFill: document.getElementById('movesBarFill'),
      movesBarHot: document.getElementById('movesBarHot'),
      smoothBarFill: document.getElementById('smoothBarFill'),
      smoothBarHot: document.getElementById('smoothBarHot'),
      durationBarFill: document.getElementById('durationBarFill'),
      durationBarHot: document.getElementById('durationBarHot'),
      f11BtnOuter: document.getElementById('f11BtnOuter'),
      f11BtnInner: document.getElementById('f11BtnInner'),
      f12BtnOuter: document.getElementById('f12BtnOuter'),
      f12BtnInner: document.getElementById('f12BtnInner'),
      f11BtnGroup: document.getElementById('f11BtnGroup'),
      f12BtnGroup: document.getElementById('f12BtnGroup'),
    };

    const prevState = {
      mouseOn: false,
      keyOn: false,
      maxPixels: state.maxPixels,
      smoothSteps: state.smoothSteps,
      movesBeforeReturn: state.movesBeforeReturn,
      moveDuration: state.moveDuration,
      keyInterval: state.keyInterval,
    };

    function buttonColors(isOn) {
      return isOn
        ? {
            outerFill: '#6a3328',
            outerStroke: '#ff967e',
            innerFill: 'rgba(255,126,104,0.16)',
          }
        : {
            outerFill: '#30261a',
            outerStroke: '#ffd27d',
            innerFill: 'rgba(255,179,71,0.08)',
          };
    }

    function applyButtonState(outer, inner, isOn) {
      const colors = buttonColors(isOn);
      outer.setAttribute('fill', colors.outerFill);
      outer.setAttribute('stroke', colors.outerStroke);
      inner.setAttribute('fill', colors.innerFill);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function msToSec(intervalMs) {
      return intervalMs / 1000;
    }

    function secToMs(intervalSec) {
      return Math.round(intervalSec * 1000);
    }

    function applyBackendState(newState) {
      if (typeof newState.mouseOn === 'boolean') {
        state.mouseOn = newState.mouseOn;
      }
      if (typeof newState.keyOn === 'boolean') {
        state.keyOn = newState.keyOn;
      }
      if (typeof newState.intervalMs === 'number') {
        state.intervalSec = clamp(msToSec(newState.intervalMs), MOUSE_MIN_SEC, MOUSE_MAX_SEC);
      }
      if (typeof newState.maxPixels === 'number') {
        state.maxPixels = clamp(newState.maxPixels, DIST_MIN, DIST_MAX);
      }
      if (typeof newState.movesBeforeReturn === 'number') {
        state.movesBeforeReturn = Math.max(1, newState.movesBeforeReturn);
      }
      if (typeof newState.smoothSteps === 'number') {
        state.smoothSteps = Math.max(1, newState.smoothSteps);
      }
      if (typeof newState.moveDuration === 'number') {
        state.moveDuration = Math.max(0, newState.moveDuration);
      }
      if (typeof newState.keyInterval === 'number') {
        state.keyInterval = clamp(newState.keyInterval, KEY_MIN_SEC, KEY_MAX_SEC);
      }
    }

    function updateBars() {
      const leftPct = clamp((state.maxPixels - DIST_MIN) / (DIST_MAX - DIST_MIN), 0.05, 1);
      const leftHeight = Math.round(236 * leftPct);
      els.leftBarFill.setAttribute('height', leftHeight);
      els.leftBarFill.setAttribute('y', 246 - leftHeight);

      const rightPct = clamp((state.keyInterval - KEY_MIN_SEC) / (KEY_MAX_SEC - KEY_MIN_SEC), 0.05, 1);
      const rightHeight = Math.round(236 * rightPct);
      els.rightBarFill.setAttribute('height', rightHeight);
      els.rightBarFill.setAttribute('y', 246 - rightHeight);

      const movesPct = clamp((state.movesBeforeReturn - MOVES_MIN) / (MOVES_MAX - MOVES_MIN), 0.05, 1);
      const movesHeight = Math.round(236 * movesPct);
      els.movesBarFill.setAttribute('height', movesHeight);
      els.movesBarFill.setAttribute('y', 246 - movesHeight);

      const smoothPct = clamp((state.smoothSteps - SMOOTH_MIN) / (SMOOTH_MAX - SMOOTH_MIN), 0.05, 1);
      const smoothHeight = Math.round(236 * smoothPct);
      els.smoothBarFill.setAttribute('height', smoothHeight);
      els.smoothBarFill.setAttribute('y', 246 - smoothHeight);

      const durPct = clamp((state.moveDuration - DURATION_MIN) / (DURATION_MAX - DURATION_MIN), 0.05, 1);
      const durHeight = Math.round(236 * durPct);
      els.durationBarFill.setAttribute('height', durHeight);
      els.durationBarFill.setAttribute('y', 246 - durHeight);
    }

    function addNotice(message, isWarn = false) {
      const item = document.createElement('div');
      item.className = isWarn ? 'notice-item warn' : 'notice-item';

      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      item.textContent = `${hh}:${mm}:${ss} ${message}`;

      els.noticeList.prepend(item);
      while (els.noticeList.children.length > 8) {
        els.noticeList.removeChild(els.noticeList.lastElementChild);
      }
    }

    function render() {
      els.svgMouseInterval.textContent = `${state.intervalSec.toFixed(2)} s`;
      els.svgKeyInterval.textContent = `${state.keyInterval.toFixed(2)} s`;
      els.mouseStatusStrip.textContent = state.mouseOn ? `MOUSE ON ${state.intervalSec.toFixed(2)}s` : `MOUSE OFF ${state.intervalSec.toFixed(2)}s`;
      els.keyStatusStrip.textContent = state.keyOn ? `KEY ON ${state.keyInterval.toFixed(2)}s` : `KEY OFF ${state.keyInterval.toFixed(2)}s`;

      els.telemetryMouseSec.textContent = `Mouse Sec: ${state.intervalSec.toFixed(2)}`;
      els.telemetryKeySec.textContent = `Key Sec: ${state.keyInterval.toFixed(2)}`;
      els.telemetryMaxPx.textContent = `Max Px: ${state.maxPixels}`;
      els.telemetryMoves.textContent = `Moves: ${state.movesBeforeReturn}`;
      els.telemetrySmooth.textContent = `Smooth: ${state.smoothSteps}`;
      els.telemetryMoveDur.textContent = `Move Sec: ${state.moveDuration.toFixed(2)}`;

      applyButtonState(els.f11BtnOuter, els.f11BtnInner, state.keyOn);
      applyButtonState(els.f12BtnOuter, els.f12BtnInner, state.mouseOn);

      updateBars();

      if (state.mouseOn !== prevState.mouseOn) {
        addNotice(state.mouseOn ? 'F12: Mouse drift enabled' : 'F12: Mouse drift disabled', !state.mouseOn);
      }
      if (state.keyOn !== prevState.keyOn) {
        addNotice(state.keyOn ? 'F11: Key loop enabled' : 'F11: Key loop disabled', !state.keyOn);
      }
      if (Math.abs(state.maxPixels - prevState.maxPixels) >= 1) {
        addNotice(`Distance set to ${state.maxPixels}px`);
      }
      if (Math.abs(state.smoothSteps - prevState.smoothSteps) >= 1) {
        addNotice(`Smoothness set to ${state.smoothSteps} steps`);
      }
      if (Math.abs(state.movesBeforeReturn - prevState.movesBeforeReturn) >= 1) {
        addNotice(`Jumps set to ${state.movesBeforeReturn}`);
      }
      if (Math.abs(state.moveDuration - prevState.moveDuration) >= 0.01) {
        addNotice(`Move sec set to ${state.moveDuration.toFixed(2)}`);
      }
      if (Math.abs(state.keyInterval - prevState.keyInterval) >= 0.05) {
        addNotice(`Key sec set to ${state.keyInterval.toFixed(2)}s`);
      }

      prevState.mouseOn = state.mouseOn;
      prevState.keyOn = state.keyOn;
      prevState.maxPixels = state.maxPixels;
      prevState.smoothSteps = state.smoothSteps;
      prevState.movesBeforeReturn = state.movesBeforeReturn;
      prevState.moveDuration = state.moveDuration;
      prevState.keyInterval = state.keyInterval;
    }

    async function pushSettings() {
      if (window.pywebview && window.pywebview.api) {
        await window.pywebview.api.update_settings({
          intervalMs: secToMs(state.intervalSec),
          maxPixels: state.maxPixels,
          movesBeforeReturn: state.movesBeforeReturn,
          smoothSteps: state.smoothSteps,
          moveDuration: state.moveDuration,
          keyInterval: state.keyInterval,
        });
      }
    }

    async function toggleMouse() {
      if (window.pywebview && window.pywebview.api) {
        const newState = await window.pywebview.api.toggle_mouse();
        applyBackendState(newState);
      } else {
        state.mouseOn = !state.mouseOn;
      }
      render();
    }

    async function toggleKey() {
      if (window.pywebview && window.pywebview.api) {
        const newState = await window.pywebview.api.toggle_key();
        applyBackendState(newState);
      } else {
        state.keyOn = !state.keyOn;
      }
      render();
    }

    function percentFromEvent(event, hotElement) {
      const rect = hotElement.getBoundingClientRect();
      const y = clamp((event.clientY - rect.top) / rect.height, 0, 1);
      return 1 - y;
    }

    function setDistanceFromBar(event) {
      const pct = percentFromEvent(event, els.leftBarHot);
      state.maxPixels = Math.round(clamp(DIST_MIN + pct * (DIST_MAX - DIST_MIN), DIST_MIN, DIST_MAX));
      render();
    }

    function setSmoothFromBar(event) {
      const pct = percentFromEvent(event, els.smoothBarHot);
      state.smoothSteps = Math.round(clamp(SMOOTH_MIN + pct * (SMOOTH_MAX - SMOOTH_MIN), SMOOTH_MIN, SMOOTH_MAX));
      render();
    }

    function setKeySecFromBar(event) {
      const pct = percentFromEvent(event, els.rightBarHot);
      state.keyInterval = clamp(KEY_MIN_SEC + pct * (KEY_MAX_SEC - KEY_MIN_SEC), KEY_MIN_SEC, KEY_MAX_SEC);
      state.keyInterval = Math.round(state.keyInterval * 100) / 100;
      render();
    }

    function setMovesFromBar(event) {
      const pct = percentFromEvent(event, els.movesBarHot);
      state.movesBeforeReturn = Math.round(clamp(MOVES_MIN + pct * (MOVES_MAX - MOVES_MIN), MOVES_MIN, MOVES_MAX));
      render();
    }

    function setDurationFromBar(event) {
      const pct = percentFromEvent(event, els.durationBarHot);
      state.moveDuration = clamp(DURATION_MIN + pct * (DURATION_MAX - DURATION_MIN), DURATION_MIN, DURATION_MAX);
      state.moveDuration = Math.round(state.moveDuration * 100) / 100;
      render();
    }

    function wireBarDrag(hotElement, setter) {
      let dragging = false;

      hotElement.addEventListener('pointerdown', (event) => {
        dragging = true;
        hotElement.setPointerCapture(event.pointerId);
        setter(event);
      });

      hotElement.addEventListener('pointermove', (event) => {
        if (!dragging) {
          return;
        }
        setter(event);
      });

      hotElement.addEventListener('pointerup', async (event) => {
        if (!dragging) {
          return;
        }
        dragging = false;
        setter(event);
        await pushSettings();
      });

      hotElement.addEventListener('pointercancel', () => {
        dragging = false;
      });

      hotElement.addEventListener('click', async (event) => {
        setter(event);
        await pushSettings();
      });
    }

    async function pullState() {
      if (!window.pywebview || !window.pywebview.api) {
        return;
      }

      try {
        const latest = await window.pywebview.api.get_state();
        applyBackendState(latest);
        render();
      } catch (error) {
      }
    }

    window.app = {
      updateFromPython(newState) {
        applyBackendState(newState);
        render();
      }
    };

    els.f12BtnGroup.addEventListener('click', toggleMouse);
    els.f11BtnGroup.addEventListener('click', toggleKey);

    wireBarDrag(els.leftBarHot, setDistanceFromBar);
    wireBarDrag(els.rightBarHot, setKeySecFromBar);
    wireBarDrag(els.movesBarHot, setMovesFromBar);
    wireBarDrag(els.smoothBarHot, setSmoothFromBar);
    wireBarDrag(els.durationBarHot, setDurationFromBar);

    window.addEventListener('pywebviewready', async () => {
      const initial = await window.pywebview.api.get_state();
      applyBackendState(initial);
      addNotice('Connected to backend');
      render();
      window.setInterval(pullState, 300);
    });

    render();
  </script>
</body>
</html>
